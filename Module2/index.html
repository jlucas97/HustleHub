<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hustle Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

        .dashboard-container {
            max-width: 900px;
            margin-top: 50px;
        }

        #revenueChart {
            max-height: 350px;
        }
    </style>
</head>
<body>
    <div class="container dashboard-container bg-white shadow-sm p-5 rounded">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">The Hustle Hub</h1>
            <p class="text-muted">Financial Command Center</p>
        </header>
        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="card bg-primary text-white text-center border-0 shadow">
                    <div class="card-body">
                        <h5 class="card-title opacity-75">Total Portfolio Value</h5>
                        <p id="total-value" class="display-4 fw-bold mb-0">$0.00</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mb-5">
            <canvas id="revenueChart"></canvas>
        </div>
        <div>
            <h2 class="h4 mb-3">Active Ventures</h2>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Project Name</th>
                            <th>Total Revenue</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
